[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install",
  "python3 -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[variables]
PYTHON_CMD = "/opt/venv/bin/python3"

[start]
cmd = "node server.js"
